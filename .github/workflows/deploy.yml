name: Deploy

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["Create docker image", "Create frontend docker image"]
    types:
      - completed
    branches:
      - master
  workflow_call:
    secrets:
      DOCKER_REGISTRY_USERNAME:
        required: true
      DOCKER_REGISTRY_PASSWORD:
        required: true
      HOSTNAME:
        required: true
      AUTH_USER:
        required: true
      AUTH_KEY:
        required: true

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' || github.event_name == 'workflow_call' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Copy docker-compose to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HOSTNAME }}
          username: ${{ secrets.AUTH_USER }}
          key: ${{ secrets.AUTH_KEY }}
          source: "docker-compose.yml"
          target: "/opt/sharkie"

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.HOSTNAME }}
          username: ${{ secrets.AUTH_USER }}
          key: ${{ secrets.AUTH_KEY }}
          script: |
            cd /opt/sharkie
            docker login registry.keireira.com \
              -u "${{ secrets.DOCKER_REGISTRY_USERNAME }}" \
              -p "${{ secrets.DOCKER_REGISTRY_PASSWORD }}"
            docker compose pull
            docker compose up -d --remove-orphans
            docker image prune -f
            docker logout registry.keireira.com

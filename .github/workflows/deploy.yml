name: Deploy

on:
  push:
    branches: [master]
    paths-ignore:
      - "docs/**"
      - "rules/**"
      - "*.md"
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Detect changes
        uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            backend:
              - 'src/**'
              - 'migrations/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'Dockerfile'
            frontend:
              - 'frontend/**'

  build-backend:
    needs: changes
    if: needs.changes.outputs.backend == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment: registry

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Log in to registry
        uses: docker/login-action@v4
        with:
          registry: registry.keireira.com
          username: ${{ secrets.DOCKER_REGISTRY_USERNAME }}
          password: ${{ secrets.DOCKER_REGISTRY_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: registry.keireira.com/sharkie:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Registry cleanup
        run: |
          curl -sf -H 'X-Webhook-Token: ${{ secrets.HOOK_TOKEN }}' \
            https://hooks.keireira.com/registry-cleanup

  build-frontend:
    needs: changes
    if: needs.changes.outputs.frontend == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment: registry

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Log in to registry
        uses: docker/login-action@v4
        with:
          registry: registry.keireira.com
          username: ${{ secrets.DOCKER_REGISTRY_USERNAME }}
          password: ${{ secrets.DOCKER_REGISTRY_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: frontend
          file: frontend/Dockerfile
          push: true
          tags: registry.keireira.com/sharkie-fe:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Registry cleanup
        run: |
          curl -sf -H 'X-Webhook-Token: ${{ secrets.HOOK_TOKEN }}' \
            https://hooks.keireira.com/registry-cleanup

  deploy:
    needs: [build-backend, build-frontend]
    if: always() && !failure() && !cancelled()
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Copy docker-compose to server
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.HOSTNAME }}
          username: ${{ secrets.AUTH_USER }}
          key: ${{ secrets.AUTH_KEY }}
          source: "docker-compose.yml"
          target: "/opt/sharkie"

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.HOSTNAME }}
          username: ${{ secrets.AUTH_USER }}
          key: ${{ secrets.AUTH_KEY }}
          script: |
            cd /opt/sharkie
            docker login registry.keireira.com \
              -u "${{ secrets.DOCKER_REGISTRY_USERNAME }}" \
              -p "${{ secrets.DOCKER_REGISTRY_PASSWORD }}"
            docker compose pull
            docker compose up -d --remove-orphans
            docker image prune -f
            docker logout registry.keireira.com

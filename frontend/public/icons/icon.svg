    <path d="M16 20 Q14 25 12 26 Q13 23 14 21 Z" fill="#5B8FA1"/>
    <!-- Eye -->
    <circle cx="24" cy="13" r="3" fill="#2D3748"/>
    <circle cx="25" cy="12" r="1" fill="white"/>
    <!-- W mouth -->
    <path d="M26 18 L27.5 17 L29 18.5 L30 17" stroke="#2D3748" stroke-width="1.2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

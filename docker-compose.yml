services:
  db:
    image: postgres:17-alpine
    container_name: sharkie-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-sharkie}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-sharkie}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sharkie} -d ${POSTGRES_DB:-sharkie}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - sharkie-network

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sharkie-app
    restart: unless-stopped
    ports:
      - "${APP_PORT:-3000}:3000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-sharkie}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-sharkie}
      CURRENCY_API_URL: ${CURRENCY_API_URL}
      CURRENCY_API_KEY: ${CURRENCY_API_KEY}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - sharkie-network

volumes:
  postgres_data:

networks:
  sharkie-network:
    driver: bridge

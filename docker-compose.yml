services:
  db:
    image: postgres:17-alpine
    container_name: SHARKIE-DB
    restart: unless-stopped
    env_file:
      - sharkie_db.env
    volumes:
      - sharkie_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sharkie -d sharkie"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - sharkie-network

  app:
    image: registry.keireira.com/sharkie:latest
    container_name: SHARKIE-APP
    restart: unless-stopped
    labels:
      org.opencontainers.image.title: "Sharkie — Exchange Rates API"
      org.opencontainers.image.description: "sharkie.keireira.com"
      org.opencontainers.image.authors: "Alena Dzhukich <mail@alena.red>"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    ports:
      - 127.0.0.1:4444:3000
    env_file:
      - sharkie.env
    depends_on:
      db:
        condition: service_healthy
    networks:
      - sharkie-network

volumes:
  sharkie_db_data:

networks:
  sharkie-network:
    driver: bridge

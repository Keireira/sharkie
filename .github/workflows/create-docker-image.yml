name: Create docker image

on:
  push:
    branches:
      - master
  workflow_dispatch:
  workflow_call:
    secrets:
      DOCKER_REGISTRY_USERNAME:
        required: true
      DOCKER_REGISTRY_PASSWORD:
        required: true
      HOOK_TOKEN:
        required: true

jobs:
  create-docker-image:
    runs-on: ubuntu-latest
    environment: registry

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to registry
        uses: docker/login-action@v2
        with:
          registry: registry.keireira.com
          username: ${{ secrets.DOCKER_REGISTRY_USERNAME }}
          password: ${{ secrets.DOCKER_REGISTRY_PASSWORD }}

      - name: Build
        run: |
          docker build --file Dockerfile \
            --tag "registry.keireira.com/sharkie:latest" .

      - name: Publish
        run: docker push "registry.keireira.com/sharkie:latest"

      - name: Registry cleanup
        run: "curl -H 'X-Webhook-Token: ${{ secrets.HOOK_TOKEN }}' https://hooks.keireira.com/registry-cleanup"
